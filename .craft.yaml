# ==============================================================================
# Craft Internal Build Configuration (.craft.yaml)
# ==============================================================================
# This configuration file is used exclusively by contributors and maintainers
# to build, test, and generate documentation for the Craft CLI toolchain itself.
#
# If you are looking for an example of how to configure your own projects,
# please refer to the official documentation or use the `craft create` command.
# ==============================================================================

# Project Metadata
name: craft
# version: 0.2.0 # if .version file have you dont need this

# Build Engine Configuration
toolchain: go1.25.0
entry_point: .
output_dir: bin

# Automatically inject the version string into this package at build time
# version_pkg: main.CraftAppVersion

# Target Platforms
build_all: false
platforms:
  - current

# ==============================================================================
# Task Runner (Custom Commands)
# ==============================================================================
commands:
  # Global environment variables injected natively into all tasks
  envs:
    APP_NAME: "Craft"

  # Atomic Commands
  # build-craft: craft build --out .
  build-craft: craft build
  install-craft: craft install .

  # Composite Task: Automates building and installing Craft globally
  setup:
    - echo Setting up {APP_NAME} globally on your system...
    - $build-craft # this only example step not need you can use only `craft install .` this command  always work not need build command
    - $install-craft
    - echo {APP_NAME} has been successfully built and installed!

  # Example Task: Database migrations (Replace with your actual tools like Goose)
  migrate:
    db: "echo Migrating DB on {OS} using {APP_BIN_PATH:NOBUILD} with args: {ARGS}"
    logdb: "echo Migrating Log DB on {OS}"

  # Documentation Server
  # Runs the Python development server for viewing the HTML documentation
  docs: uv run docs/server.py

  # Markdown Viewer
  # Quickly previews a markdown file without typing long CLI flags manually.
  # Usage: craft run mdview <path/to/file.md>
  mdview: uv run docs/server.py --md-view {ARGS}

  # Nested Tasks
  craft:
    test: go test ./... -v

# ==============================================================================
# Build Profiles
# ==============================================================================
profiles:
  npm:
    output_dir: npm/bin
    name: ""
    build_all: true
    platforms: []
    exact_name: false
  release:
    output_dir: releases/v1
    name: ""
    build_all: false
    platforms:
      - linux/amd64
      - windows/amd64
    exact_name: false

# ==============================================================================
# Advanced Compiler Flags
# ==============================================================================
auto_install: true
strip_debug: true
exact_name: true
trimpath: true
cgo_enabled: false
race: false
tags: []

# ==============================================================================
# Development Watcher (craft dev)
# ==============================================================================
dev:
  watch:
    delay_ms: 500
    include_exts:
      - go
      - html
      - tpl
      - env
      - yaml
    exclude_dirs:
      - bin
      - tmp
      - vendor
      - node_modules
      - .git
      - assets
      - testdata
      - docs
      - .docs
    exclude_files:
      - .craft.yaml

# ==============================================================================
# Asset Minification
# ==============================================================================
minify:
  enabled: false
  extensions:
    - .html
    - .css
    - .js
    - .json
    - .svg
  dirs: []
